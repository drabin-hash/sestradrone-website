<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: #f7f9fc;
      color: #1f2937;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
</body>
</html>
